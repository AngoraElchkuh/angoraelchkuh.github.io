<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AngoraElchKuh — AI Artist & Merch Designer</title>
  <meta name="description" content="AngoraElchKuh — AI Artist, Merch Designer & Creator. Links zu Amazon Shop, YouTube, TikTok, Twitch und Instagram.">
  <meta property="og:title" content="AngoraElchKuh">
  <meta property="og:description" content="AI Artist & Merch Designer — alle Links an einem Ort.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://angoraelchkuh.github.io">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --slate-950: #0c0f1a;
      --slate-900: #111827;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-400: #94a3b8;
      --slate-200: #e2e8f0;
      --white: #f8fafc;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --teal: #2dd4bf;
      --teal-glow: rgba(45, 212, 191, 0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      background: var(--slate-950);
      color: var(--white);
    }

    /* Mesh gradient background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 80%;
      height: 80%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 60%);
      animation: float1 25s ease-in-out infinite alternate;
    }

    .bg::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.08) 0%, transparent 60%);
      animation: float2 20s ease-in-out infinite alternate;
    }

    @keyframes float1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-60px, 40px) scale(1.1); }
    }
    @keyframes float2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.05); }
    }

    /* Subtle grid pattern */
    .grid-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    /* Glass card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 1.5rem;
      padding: 2.5rem 2rem 2rem;
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03),
        0 20px 60px rgba(0, 0, 0, 0.4),
        0 0 120px rgba(99, 102, 241, 0.05);
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Accent line top */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--teal), transparent);
      border-radius: 2px;
      opacity: 0.7;
    }

    /* Profile */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.6s ease-out 0.15s both;
    }

    .avatar-wrap {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      z-index: -1;
      animation: rotateGradient 6s linear infinite;
    }

    @keyframes rotateGradient {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .avatar-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-glow), var(--teal-glow));
      z-index: -2;
      filter: blur(12px);
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--slate-950);
      display: block;
    }

    .name {
      font-family: 'Sora', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--white) 0%, var(--slate-200) 50%, var(--teal) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--slate-400);
    }

    /* Status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.8rem;
      background: rgba(45, 212, 191, 0.08);
      border: 1px solid rgba(45, 212, 191, 0.15);
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--teal);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--teal);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(45, 212, 191, 0); }
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--slate-700), transparent);
      animation: fadeUp 0.6s ease-out 0.3s both;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      width: 100%;
      animation: fadeUp 0.6s ease-out 0.4s both;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1.1rem;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(99, 102, 241, 0.06);
      border-radius: 14px;
      text-decoration: none;
      color: var(--slate-200);
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .link-btn:hover {
      background: rgba(99, 102, 241, 0.08);
      border-color: rgba(99, 102, 241, 0.2);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.1);
      color: var(--white);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(99, 102, 241, 0.08);
      transition: all 0.25s ease;
    }

    .link-btn:hover .link-icon {
      background: rgba(99, 102, 241, 0.15);
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      fill: var(--accent-light);
      transition: all 0.25s ease;
    }

    .link-btn:hover .link-icon svg {
      fill: var(--white);
    }

    .link-label { flex: 1; }

    .link-arrow {
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.25s ease;
      color: var(--accent-light);
      font-size: 1.1rem;
    }

    .link-btn:hover .link-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Featured (Amazon) */
    .link-btn.featured {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(45, 212, 191, 0.05));
      border-color: rgba(99, 102, 241, 0.12);
    }

    .link-btn.featured .link-icon {
      background: linear-gradient(135deg, var(--accent), var(--teal));
    }

    .link-btn.featured .link-icon svg {
      fill: white;
    }

    .featured-tag {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      background: rgba(45, 212, 191, 0.1);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }

    /* Footer */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      animation: fadeUp 0.6s ease-out 0.55s both;
    }

    .footer-brand {
      font-family: 'Sora', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--slate-700);
    }

    .imprint-link {
      font-size: 0.6rem;
      color: var(--slate-700);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s ease;
    }

    .imprint-link:hover {
      color: var(--slate-400);
    }

    .imprint-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .imprint-box {
      position: relative;
      background: var(--slate-900);
      border: 1px solid var(--slate-700);
      border-radius: 16px;
      padding: 2rem;
      max-width: 320px;
      width: 90%;
      text-align: center;
    }

    .imprint-box h3 {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--white);
    }

    .imprint-box p {
      font-size: 0.85rem;
      color: var(--slate-400);
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .imprint-close {
      position: absolute;
      top: 0.75rem;
      right: 1rem;
      font-size: 1.4rem;
      color: var(--slate-400);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .imprint-close:hover {
      color: var(--white);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (min-width: 768px) {
      .card { padding: 3rem 2.5rem 2.5rem; }
      .name { font-size: 2rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
